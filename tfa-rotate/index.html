<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TFA排队轮换管理系统</title>
<script type="importmap">
{"imports": {"@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"}}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  h1 { font-size: 24px; font-weight: 600; }
  .stats-bar {
    display: flex; gap: 12px;
  }
  .stat-card {
    flex: 1; background: #1e293b; border-radius: 12px; padding: 16px;
    border: 1px solid #334155;
    text-align: center;
  }
  .stat-card .label { font-size: 14px; color: #94a3b8; margin-bottom: 6px; }
  .stat-card .value { font-size: 32px; font-weight: 700; }
  .stat-card.online .value { color: #22c55e; }
  .stat-card.queue .value { color: #f59e0b; }
  .stat-card.locked .value { color: #ef4444; }

  .config-section {
    background: #1e293b; border-radius: 12px; padding: 16px;
    margin-bottom: 16px; border: 1px solid #334155;
  }
  .section-header {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
    margin-bottom: 0;
  }
  .section-header .arrow { font-size: 12px; transition: transform 0.2s; display: inline-block; }
  .section-header.collapsed .arrow { transform: rotate(-90deg); }
  .section-body { margin-top: 12px; }
  .section-body.hidden { display: none; }
  .config-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .config-row:last-child { margin-bottom: 0; }
  .config-label { font-size: 16px; font-weight: 500; min-width: 80px; }
  .config-item {
    display: flex; align-items: center; gap: 8px;
  }
  .config-item span { font-size: 15px; color: #94a3b8; }

  .device-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }
  .device-card {
    background: #1e293b; border-radius: 12px; padding: 16px;
    border: 1px solid #334155; transition: all 0.2s;
  }
  .device-card:hover { border-color: #475569; }
  .device-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .device-name { font-size: 18px; font-weight: 600; }
  .status-badge {
    padding: 4px 10px; border-radius: 20px; font-size: 14px; font-weight: 500;
  }
  .status-online { background: #166534; color: #bbf7d0; }
  .status-offline { background: #7f1d1d; color: #fecaca; }

  .device-info {
    font-size: 14px; color: #94a3b8; line-height: 1.8;
    margin-bottom: 12px;
  }
  .device-info span { color: #e2e8f0; }

  .queue-section {
    border-top: 1px solid #334155; padding-top: 12px;
  }
  .queue-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .queue-title { font-size: 16px; font-weight: 500; }

  .toggle {
    position: relative; width: 64px; height: 36px;
    background: #475569; border-radius: 18px; cursor: pointer;
    transition: background 0.2s; flex-shrink: 0;
  }
  .toggle.active { background: #22c55e; }
  .toggle::after {
    content: ''; position: absolute; top: 4px; left: 4px;
    width: 28px; height: 28px; background: white;
    border-radius: 50%; transition: transform 0.2s;
  }
  .toggle.active::after { transform: translateX(28px); }

  .score-display {
    display: flex; justify-content: center; align-items: center;
    gap: 20px; margin: 10px 0; padding: 10px;
    background: #0f172a; border-radius: 8px;
  }
  .score-box { text-align: center; }
  .score-box .label { font-size: 14px; color: #94a3b8; }
  .score-box .num { font-size: 28px; font-weight: 700; color: #22c55e; }
  .score-divider { font-size: 20px; color: #64748b; }

  .progress-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; margin-bottom: 6px;
  }
  .progress-bar {
    width: 100%; height: 8px; background: #334155; border-radius: 4px;
    overflow: hidden; margin-bottom: 10px;
  }
  .progress-fill {
    height: 100%; background: #f59e0b; transition: width 0.3s;
  }
  .progress-fill.full { background: #ef4444; }

  .controls {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .input-group {
    flex: 1; display: flex; align-items: center; gap: 8px;
    min-width: 120px;
  }
  .input-group label { font-size: 15px; color: #94a3b8; white-space: nowrap; }
  .input-group input {
    width: 60px; padding: 10px 12px; border-radius: 6px;
    border: 1px solid #475569; background: #0f172a; color: #e2e8f0;
    font-size: 18px; text-align: center;
  }
  .btn {
    padding: 12px 20px; border-radius: 10px; border: none;
    font-size: 16px; cursor: pointer; font-weight: 600;
    transition: all 0.2s; min-height: 48px;
  }
  .btn-primary { background: #3b82f6; color: white; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #475569; color: white; }
  .btn-secondary:hover { background: #64748b; }
  .btn-danger { background: #ef4444; color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-sm {
    padding: 4px 10px; border-radius: 6px; border: none;
    font-size: 12px; cursor: pointer; font-weight: 500;
    min-height: auto; background: #475569; color: white;
  }
  .btn-sm:hover { background: #64748b; }

  .state-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 13px; font-weight: 500;
  }
  .state-PLAYING { background: #166534; color: #bbf7d0; }
  .state-COOLDOWN { background: #1e40af; color: #bfdbfe; }
  .state-LOCKED { background: #7f1d1d; color: #fecaca; }
  .state-IDLE { background: #57534e; color: #d6d3d1; }

  .mac-address {
    font-family: monospace; font-size: 12px; color: #64748b;
  }
  .last-update { font-size: 12px; color: #64748b; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: #64748b;
  }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: #94a3b8; }

  .text-input {
    padding: 10px 12px; border-radius: 6px;
    border: 1px solid #475569; background: #0f172a; color: #e2e8f0;
    font-size: 16px;
  }

  /* 手机端响应式 */
  @media (max-width: 768px) {
    body { padding: 12px; }
    h1 { font-size: 20px; }
    .stats-bar { flex-direction: column; gap: 8px; }
    .stat-card { padding: 12px; display: flex; align-items: center; justify-content: space-between; }
    .stat-card .label { font-size: 16px; margin-bottom: 0; }
    .stat-card .value { font-size: 28px; }
    .config-row { flex-direction: column; align-items: stretch; gap: 8px; }
    .config-label { min-width: auto; }
    .config-item { justify-content: space-between; }
    .device-grid { grid-template-columns: 1fr; }
    .device-card { padding: 14px; }
    .device-name { font-size: 17px; }
    .score-box .num { font-size: 24px; }
    .btn { flex: 1; min-width: 0; }
    .controls { gap: 6px; }
    .input-group { min-width: 0; }
    .input-group input { width: 50px; font-size: 18px; }
    .text-input { width: 100%; }
  }

  /* 大屏优化 */
  @media (min-width: 1200px) {
    .device-grid { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎮 TFA排队轮换管理系统</h1>
    <div style="font-size: 14px; color: #64748b;">
      <span id="connStatus">连接中...</span>
    </div>
  </header>

  <div class="config-section">
    <div class="section-header" data-section="stats">
      <span class="arrow">▼</span>
      <span class="config-label">设备状态</span>
    </div>
    <div class="section-body" id="body-stats">
      <div class="stats-bar" style="margin-bottom:0;">
        <div class="stat-card online">
          <div class="label">在线设备</div>
          <div class="value" id="statOnline">0</div>
        </div>
        <div class="stat-card queue">
          <div class="label">排队开启</div>
          <div class="value" id="statQueue">0</div>
        </div>
        <div class="stat-card locked">
          <div class="label">已锁定</div>
          <div class="value" id="statLocked">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="config-section">
    <div class="section-header collapsed" data-section="system">
      <span class="arrow">▼</span>
      <span class="config-label">系统配置</span>
    </div>
    <div class="section-body hidden" id="body-system">
    <div class="config-row">
      <div class="config-item">
        <span>密码解锁</span>
        <div class="toggle" id="pwdToggle"></div>
      </div>
      <div class="config-item">
        <span>争先模式</span>
        <div class="toggle" id="winModeToggle"></div>
      </div>
    </div>
    <div class="config-row">
      <div class="config-item">
        <span>密码:</span>
        <input type="text" id="unlockPassword" placeholder="新密码" class="text-input" style="width: 140px;">
      </div>
      <button class="btn btn-primary" id="btnUpdatePassword">修改密码</button>
    </div>
    <div class="config-row">
      <div class="config-item">
        <span>设备换口超时(秒):</span>
        <input type="number" min="1" max="300" value="15" id="deviceSwapTimeout" class="text-input" style="width: 80px;">
      </div>
      <button class="btn btn-primary" id="btnUpdateSwapTimeout">设置</button>
    </div>
    </div>
  </div>

  <div class="config-section">
    <div class="section-header" data-section="batch">
      <span class="arrow">▼</span>
      <span class="config-label">批量操作</span>
    </div>
    <div class="section-body" id="body-batch">
    <div class="config-row">
      <div class="input-group">
        <label>全局局数:</label>
        <input type="number" min="1" max="99" value="3" id="batchMaxMatches">
      </div>
      <button class="btn btn-primary" id="btnBatchMaxMatches">设置所有局数</button>
      <button class="btn btn-secondary" id="btnBatchOn">全部开启排队</button>
      <button class="btn btn-secondary" id="btnBatchOff">全部关闭排队</button>
      <button class="btn btn-danger" id="btnBatchReset">全部重置计数器</button>
    </div>
    <div class="config-row" style="margin-top: 8px;">
      <span class="config-label" style="cursor: pointer; user-select: none;" id="btnToggleExclude">▼ 排除设备（点击展开）</span>
    </div>
    <div class="config-row" id="excludeList" style="display: none; flex-wrap: wrap; gap: 6px;">
      <span style="font-size: 13px; color: #94a3b8;">勾选的设备不会被批量操作影响：</span>
    </div>
    </div>
  </div>

  <div class="device-grid" id="deviceGrid">
    <div class="empty-state">
      <h3>加载中...</h3>
      <p>正在获取设备列表</p>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from '@supabase/supabase-js';

const SUPABASE_URL = 'https://pdupxxmjlsajnurznvhf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_pc0miZHo-55jHixjVWOoqg_TLnFPQ24';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
  realtime: {
    params: { eventsPerSecond: 10 }
  }
});

let devices = new Map();
let queueConfigs = new Map();
let excludedDevices = new Set();
let systemConfig = { password_unlock_enabled: false, unlock_password: '', win_mode: false, device_swap_timeout: 15, device_monitor_vidpids: '' };

function formatTime(isoStr) {
  if (!isoStr) return '未知';
  const d = new Date(isoStr);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  return Math.floor(diff / 86400) + '天前';
}

function isOnline(lastHeartbeat) {
  if (!lastHeartbeat) return false;
  const diff = (new Date() - new Date(lastHeartbeat)) / 1000;
  return diff < 400;
}

function updateStats() {
  let online = 0, queueOn = 0;
  for (const [id, device] of devices) {
    const onlineFlag = isOnline(device.last_heartbeat);
    if (onlineFlag) online++;
    const q = queueConfigs.get(id);
    if (q && q.queue_enabled) queueOn++;
  }
  document.getElementById('statOnline').textContent = online;
  document.getElementById('statQueue').textContent = queueOn;
  document.getElementById('statLocked').textContent = '—';
}

function populateExcludeList() {
  const container = document.getElementById('excludeList');
  const sortedDevices = Array.from(devices.entries()).sort((a, b) => {
    const nameA = a[1].device_name || a[0];
    const nameB = b[1].device_name || b[0];
    return nameA.localeCompare(nameB);
  });

  let html = '<span style="font-size:14px;color:#94a3b8;">勾选的设备不会被批量操作影响：</span>';
  for (const [id, device] of sortedDevices) {
    const name = device.device_name || id.slice(0, 8);
    // 八角笼机默认排除
    if (name === '八角笼机' && !excludedDevices.has(id)) {
      excludedDevices.add(id);
    }
    const checked = excludedDevices.has(id) ? 'checked' : '';
    html += `<label style="font-size:14px;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 8px;background:#0f172a;border-radius:6px;border:1px solid #334155;">
      <input type="checkbox" data-exclude-id="${id}" ${checked} style="width:16px;height:16px;cursor:pointer;">
      ${name}
    </label>`;
  }
  container.innerHTML = html;

  container.querySelectorAll('input[data-exclude-id]').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) {
        excludedDevices.add(cb.dataset.excludeId);
      } else {
        excludedDevices.delete(cb.dataset.excludeId);
      }
    });
  });
}

function renderDevices() {
  const grid = document.getElementById('deviceGrid');
  if (devices.size === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <h3>暂无设备</h3>
        <p>请先在设备上启动 Agent 程序</p>
      </div>`;
    updateStats();
    return;
  }

  const sortedDevices = Array.from(devices.entries()).sort((a, b) => {
    const nameA = a[1].device_name || a[0];
    const nameB = b[1].device_name || b[0];
    return nameA.localeCompare(nameB);
  });

  grid.innerHTML = sortedDevices.map(([id, device]) => {
    const q = queueConfigs.get(id) || {};
    const online = isOnline(device.last_heartbeat);
    const maxMatches = q.max_matches || 3;
    const currentMatches = q.current_matches || 0;
    const progress = Math.min((currentMatches / maxMatches) * 100, 100);
    const progressFull = currentMatches >= maxMatches;
    const queueEnabled = !!q.queue_enabled;

    return `
      <div class="device-card" data-id="${id}">
        <div class="device-header">
          <div class="device-name">${device.device_name || id.slice(0, 8)}${device.device_type ? ' <span style="font-size:13px;color:#64748b;">' + device.device_type + '</span>' : ''} <button class="btn-sm" data-action="editName" data-id="${id}">改名/类型</button></div>
          <span class="status-badge ${online ? 'status-online' : 'status-offline'}">
            ${online ? '● 在线' : '○ 离线'}
          </span>
        </div>
        <div class="device-info">
          <div class="mac-address">MAC: ${device.mac_address || '未知'}</div>
          <div class="last-update">最后心跳: ${formatTime(device.last_heartbeat)}</div>
        </div>

        <div class="queue-section">
          <div class="queue-header">
            <span class="queue-title">排队轮换</span>
            <div class="toggle ${queueEnabled ? 'active' : ''}" data-action="toggle" data-id="${id}"></div>
          </div>

          <div style="opacity: ${queueEnabled ? 1 : 0.4}; pointer-events: ${queueEnabled ? 'auto' : 'none'};">
            <div class="score-display">
              <div class="score-box">
                <div class="label">1P</div>
                <div class="num">${q.score_1p || 0}</div>
              </div>
              <div class="score-divider">VS</div>
              <div class="score-box">
                <div class="label">2P</div>
                <div class="num">${q.score_2p || 0}</div>
              </div>
            </div>

            <div class="progress-row">
              <span>进度</span>
              <span style="font-size: 13px; color: #94a3b8;">${currentMatches}/${maxMatches}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${progressFull ? 'full' : ''}" style="width: ${progress}%"></div>
            </div>

            <div class="controls">
              <div class="input-group">
                <label>局数:</label>
                <input type="number" min="1" max="99" value="${maxMatches}" data-id="${id}" id="maxMatches-${id}">
              </div>
              <button class="btn btn-primary" data-action="setMaxMatches" data-id="${id}">设置</button>
              <button class="btn btn-secondary" data-action="reset" data-id="${id}">重置</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.toggle').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const q = queueConfigs.get(id) || {};
      const newState = !q.queue_enabled;
      updateQueueConfig(id, { queue_enabled: newState });
    });
  });

  grid.querySelectorAll('[data-action="setMaxMatches"]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const input = document.getElementById('maxMatches-' + id);
      const val = parseInt(input.value);
      if (val > 0) {
        updateQueueConfig(id, { max_matches: val });
      }
    });
  });

  grid.querySelectorAll('[data-action="reset"]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (confirm('确定要重置该设备的计数器吗？')) {
        updateQueueConfig(id, { reset_counter: true });
      }
    });
  });

  grid.querySelectorAll('[data-action="editName"]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const device = devices.get(id) || {};
      const name = prompt('设备名称:', device.device_name || '');
      if (name === null) return;
      const type = prompt('设备类型:', device.device_type || '');
      if (type === null) return;
      updateDeviceName(id, name, type);
    });
  });

  updateStats();
  populateExcludeList();
}

async function updateQueueConfig(deviceId, payload) {
  try {
    const existing = queueConfigs.get(deviceId) || {};
    const updateData = { device_id: deviceId, ...existing, ...payload };

    const { data, error } = await supabase
      .from('device_queue_config')
      .upsert(updateData, { onConflict: 'device_id' });

    if (error) {
      console.error('更新失败:', error);
      alert('更新失败: ' + error.message);
    }
  } catch (e) {
    console.error('更新异常:', e);
  }
}

async function batchUpdateMaxMatches() {
  const val = parseInt(document.getElementById('batchMaxMatches').value);
  if (val <= 0) {
    alert('请输入有效的局数');
    return;
  }
  const excluded = Array.from(excludedDevices);
  const targetIds = Array.from(queueConfigs.keys()).filter(id => !excludedDevices.has(id));
  if (targetIds.length === 0) {
    alert('没有可操作的设备（所有设备均被排除）');
    return;
  }
  const msg = excluded.length > 0
    ? `确定要将 ${targetIds.length} 台设备（已排除 ${excluded.length} 台）的最大局数设置为 ${val} 吗？`
    : `确定要将所有设备的最大局数设置为 ${val} 吗？`;
  if (!confirm(msg)) return;

  for (const deviceId of targetIds) {
    await updateQueueConfig(deviceId, { max_matches: val });
  }
}

async function batchToggleQueue(enabled) {
  const excluded = Array.from(excludedDevices);
  const targetIds = Array.from(queueConfigs.keys()).filter(id => !excludedDevices.has(id));
  if (targetIds.length === 0) {
    alert('没有可操作的设备（所有设备均被排除）');
    return;
  }
  const msg = excluded.length > 0
    ? `确定要${enabled ? '开启' : '关闭'} ${targetIds.length} 台设备（已排除 ${excluded.length} 台）的排队功能吗？`
    : `确定要${enabled ? '开启' : '关闭'}所有设备的排队功能吗？`;
  if (!confirm(msg)) return;

  for (const deviceId of targetIds) {
    await updateQueueConfig(deviceId, { queue_enabled: enabled });
  }
}

async function batchReset() {
  const excluded = Array.from(excludedDevices);
  const targetIds = Array.from(queueConfigs.keys()).filter(id => !excludedDevices.has(id));
  if (targetIds.length === 0) {
    alert('没有可操作的设备（所有设备均被排除）');
    return;
  }
  const msg = excluded.length > 0
    ? `确定要重置 ${targetIds.length} 台设备（已排除 ${excluded.length} 台）的计数器吗？`
    : '确定要重置所有设备的计数器吗？';
  if (!confirm(msg)) return;

  for (const deviceId of targetIds) {
    await updateQueueConfig(deviceId, { reset_counter: true });
  }
}

async function updateDeviceName(deviceId, name, type) {
  try {
    const payload = {};
    if (name !== null) payload.device_name = name;
    if (type !== null) payload.device_type = type;
    const { data, error } = await supabase
      .from('device_status')
      .update(payload)
      .eq('id', deviceId);
    if (error) {
      console.error('更新设备名称失败:', error);
      alert('更新失败: ' + error.message);
    }
  } catch (e) {
    console.error('更新设备名称异常:', e);
  }
}

async function loadSystemConfig() {
  try {
    const { data, error } = await supabase
      .from('system_config')
      .select('*')
      .eq('id', 1);

    if (error) throw error;

    if (data && data.length > 0) {
      systemConfig = data[0];
      updateSystemConfigUI();
    }
  } catch (e) {
    console.error('加载系统配置失败:', e);
  }
}

function updateSystemConfigUI() {
  const pwdToggle = document.getElementById('pwdToggle');
  if (systemConfig.password_unlock_enabled) {
    pwdToggle.classList.add('active');
  } else {
    pwdToggle.classList.remove('active');
  }

  const winToggle = document.getElementById('winModeToggle');
  if (systemConfig.win_mode) {
    winToggle.classList.add('active');
  } else {
    winToggle.classList.remove('active');
  }

  const pwdInput = document.getElementById('unlockPassword');
  if (pwdInput) {
    pwdInput.value = systemConfig.unlock_password || '';
  }

  const swapInput = document.getElementById('deviceSwapTimeout');
  if (swapInput) {
    swapInput.value = systemConfig.device_swap_timeout || 15;
  }
}

async function updateSystemConfig(payload) {
  try {
    const { data, error } = await supabase
      .from('system_config')
      .update(payload)
      .eq('id', 1);

    if (error) {
      console.error('更新系统配置失败:', error);
      alert('更新失败: ' + error.message);
    }
  } catch (e) {
    console.error('更新系统配置异常:', e);
  }
}

async function loadDevices() {
  try {
    const { data: devicesData, error: dError } = await supabase
      .from('device_status')
      .select('*');

    if (dError) throw dError;

    devices.clear();
    for (const d of devicesData) {
      devices.set(d.id, d);
    }

    const { data: queueData, error: qError } = await supabase
      .from('device_queue_config')
      .select('*');

    if (qError) throw qError;

    queueConfigs.clear();
    for (const q of queueData) {
      queueConfigs.set(q.device_id, q);
    }

    renderDevices();
  } catch (e) {
    console.error('加载数据失败:', e);
    document.getElementById('deviceGrid').innerHTML = `
      <div class="empty-state">
        <h3>加载失败</h3>
        <p>${e.message || '请检查网络连接'}</p>
      </div>`;
  }
}

function subscribeRealtime() {
  const queueChannel = supabase.channel('queue-changes');
  queueChannel
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'device_queue_config'
    }, (payload) => {
      const record = payload.new || payload.old;
      if (!record) return;

      if (payload.eventType === 'DELETE') {
        queueConfigs.delete(record.device_id);
      } else {
        queueConfigs.set(record.device_id, record);
      }
      renderDevices();
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        document.getElementById('connStatus').textContent = '● 实时同步中';
        document.getElementById('connStatus').style.color = '#22c55e';
      }
    });

  const sysChannel = supabase.channel('system-config');
  sysChannel
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'system_config',
      filter: 'id=eq.1'
    }, (payload) => {
      const record = payload.new;
      if (record) {
        systemConfig = record;
        updateSystemConfigUI();
      }
    })
    .subscribe();
}

async function pollDevices() {
  try {
    const { data: devicesData, error: dError } = await supabase
      .from('device_status')
      .select('*');

    if (dError) throw dError;

    devices.clear();
    for (const d of devicesData) {
      devices.set(d.id, d);
    }
    renderDevices();
  } catch (e) {
    console.error('轮询设备状态失败:', e);
  }
}

async function init() {
  await loadDevices();
  await loadSystemConfig();
  subscribeRealtime();

  document.getElementById('btnBatchMaxMatches').addEventListener('click', batchUpdateMaxMatches);
  document.getElementById('btnBatchOn').addEventListener('click', () => batchToggleQueue(true));
  document.getElementById('btnBatchOff').addEventListener('click', () => batchToggleQueue(false));
  document.getElementById('btnBatchReset').addEventListener('click', batchReset);

  document.getElementById('pwdToggle').addEventListener('click', () => {
    const newVal = !systemConfig.password_unlock_enabled;
    updateSystemConfig({ password_unlock_enabled: newVal });
  });

  document.getElementById('winModeToggle').addEventListener('click', () => {
    const newVal = !systemConfig.win_mode;
    updateSystemConfig({ win_mode: newVal });
  });

  document.getElementById('btnUpdatePassword').addEventListener('click', () => {
    const newPwd = document.getElementById('unlockPassword').value;
    if (!newPwd) {
      alert('密码不能为空');
      return;
    }
    if (confirm('确定要修改解锁密码吗？')) {
      updateSystemConfig({ unlock_password: newPwd });
    }
  });

  document.getElementById('btnUpdateSwapTimeout').addEventListener('click', () => {
    const val = parseInt(document.getElementById('deviceSwapTimeout').value);
    if (val <= 0) {
      alert('请输入有效的超时秒数');
      return;
    }
    updateSystemConfig({ device_swap_timeout: val });
  });

  document.getElementById('btnToggleExclude').addEventListener('click', () => {
    const panel = document.getElementById('excludeList');
    const btn = document.getElementById('btnToggleExclude');
    if (panel.style.display === 'none') {
      panel.style.display = 'flex';
      btn.textContent = '▲ 排除设备（点击收起）';
    } else {
      panel.style.display = 'none';
      btn.textContent = '▼ 排除设备（点击展开）';
    }
  });

  setInterval(pollDevices, 15000);
  setInterval(() => {
    renderDevices();
  }, 5000);

  // 模块折叠/展开
  document.querySelectorAll('.section-header').forEach(header => {
    header.addEventListener('click', () => {
      const section = header.dataset.section;
      const body = document.getElementById('body-' + section);
      if (body) {
        const isHidden = body.classList.contains('hidden');
        if (isHidden) {
          body.classList.remove('hidden');
          header.classList.remove('collapsed');
        } else {
          body.classList.add('hidden');
          header.classList.add('collapsed');
        }
      }
    });
  });
}

init();
</script>
</body>
</html>
