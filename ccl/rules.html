    <section class="leaderboard-parent">
        <div class="section" style="padding:20px;white-space:normal;">
            <h2>CCL赛制规则</h2>
            <p style="color:#fff;line-height:1.8;">
                1. 每场比赛分为先锋、中坚、大将三场，先锋、中坚获胜各得10分，大将获胜得20分。<br>
                2. 小组赛每场最多3轮，单场得分上限50分。<br>
                3. 积分相同则比较胜场数，仍相同则比较相互胜负关系。<br>
                4. 赛季末积分最高的队伍获得总冠军。
            </p>
        </div>
    </section>
