        </nav>
        <div class="section" style="padding:20px;white-space:normal;color:#fff;line-height:1.8;">
            <p><strong>一、队伍组成</strong><br>每队3-5人，每轮上场3人（先锋、中坚、大将）。</p>
            <p><strong>二、得分规则</strong><br>先锋/中坚胜利各得10分，大将胜利得20分。单场比赛得分上限为50分。</p>
            <p><strong>三、赛制</strong><br>常规赛为单循环赛，每场比赛最多进行3轮。积分高者排名靠前，同分比较相互胜负关系。</p>
            <p><strong>四、其他</strong><br>具体赛程及对手以赛事预告为准，最终解释权归组委会所有。</p>
        </div>
    </section>
