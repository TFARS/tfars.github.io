<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛事规则</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style_tab.css">
    <link rel="stylesheet" href="/ccl/css/ccl.css">
    <link rel="stylesheet" href="/css/site-switcher.css">
</head>
<body>
    <div class="tab-section">
        <div class="tab-container">
            <a href="/ccl/index.html" class="tab">积分榜</a>
            <a href="/ccl/rules.html" class="tab active">赛事规则</a>
            <div class="dropdown-tab">
                <a id="season">赛季切换</a>
                <div class="dropdown"></div>
            </div>
        </div>
    </div>

    <section class="leaderboard-parent">
        <nav class="ladder-nav">
            <div class="ladder-title"><h2>赛事规则</h2></div>
        </nav>
        <div class="section" style="padding:20px;white-space:normal;color:#fff;line-height:1.8;">
            <p><strong>一、队伍组成</strong><br>每队3-5人，每轮上场3人（先锋、中坚、大将）。</p>
            <p><strong>二、得分规则</strong><br>先锋/中坚胜利各得10分，大将胜利得20分。单场比赛得分上限为50分。</p>
            <p><strong>三、赛制</strong><br>常规赛为单循环赛，每场比赛最多进行3轮。积分高者排名靠前，同分比较相互胜负关系。</p>
            <p><strong>四、其他</strong><br>具体赛程及对手以赛事预告为准，最终解释权归组委会所有。</p>
        </div>

        <!-- 参赛队伍展示 -->
        <nav class="ladder-nav" style="margin-top:30px;">
            <div class="ladder-title"><h2>参赛队伍</h2></div>
        </nav>
        <div id="teams-container" class="teams-grid" style="margin-top:15px;"></div>
    </section>

    <script src="/js/jquery-3.7.1.min.js"></script>
    <script src="/ccl/js/cclDataService.js"></script>
    <script src="/ccl/js/ccl_common.js"></script>
    <script src="/js/site-switcher.js"></script>
    <script src="/js/footer.js"></script>
    <script>
        (async function () {
            if (!CCLDataService.isReady()) await CCLDataService.load();
            const season = window.__currentSeason || 'latest';
            const seasonData = CCLDataService.getSeasonData(season);
            const container = document.getElementById('teams-container');
            container.innerHTML = '';
            seasonData.teams.forEach(team => {
                const card = document.createElement('div');
                card.className = 'match-card team-card';
                card.innerHTML = `
                        <div class="team-img">
                            <img src="${team.logo}" alt="${team.name}">
                        </div>
                        <div class="team-name-text">${team.name}</div>
                        <div class="team-school">${team.school}</div>
                    `;
                container.appendChild(card);
            });
        })();
    </script>
</body>
</html>
